windowrule = match:class ^(Gifview)$, center on
windowrule = match:class ^(Gifview)$, float on

windowrule = match:class ^(brave-lodlkdfmihgonocnmddehnfgiljnadcf-Default)$, opacity 1

windowrule = match:class ^(xdg-desktop-portal-gtk), float on
windowrule = match:class ^(xdg-desktop-portal-gtk), center on

windowrule = match:class ^(steam_app_0), float on
windowrule = match:class ^(steam_app_0), center on
windowrule = match:class ^(steam), center on
windowrule = match:class ^(explorer.exe), float on
windowrule = match:class ^(explorer.exe), center on
windowrule = match:class ^(discord), center on

