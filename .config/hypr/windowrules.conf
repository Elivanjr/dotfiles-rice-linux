# Biscoito config - Modulo: WINDOWRULES (regras de janelas)
# =========================================================

#Regras de janelas (blur, opacidade, flutuante, tamanho, etc)
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(blueman-manager)$, center on
windowrule = match:class ^(blueman-manager)$, size 800 600
windowrule = match:class ^(blueman-manager)$, opacity 1

windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nm-connection-editor)$, center on
windowrule = match:class ^(nm-connection-editor)$, size 800 600

windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(mpv)$, center on

windowrule = match:class ^(waypaper)$, float on
windowrule = match:class ^(waypaper)$, center on

windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(pavucontrol)$, center 800 600

windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(org.kde.ark)$, float on
windowrule = match:class ^(com.interversehq.qView)$, float on
windowrule = match:class ^(com.interversehq.qView)$, center on
windowrule = match:class ^(com.interversehq.qView)$, size 1080 620

windowrule = match:class ^(discord)$, opacity 1
windowrule = match:class ^(geany)$, opacity 0.90
windowrule = match:class ^(Spotify)$, opacity 0.87
windowrule = match:class ^(org.kde.dolphin)$, opacity 1
windowrule = match:class ^(file-png)$, float on
windowrule = match:class ^(file-jpeg)$, float on
windowrule = match:class ^(dolphin-emu)$, float on

windowrule = match:class ^(antigravity-ide)$, opacity 0.87

#Sim, essa sessão existe apenas pro gif da resenha... legal não acha?
