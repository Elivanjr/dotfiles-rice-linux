# Biscoito config - Modulo: ATALHOS
# =========================================================

# ---------------- ATALHOS ----------------
#Rofi + Clipboard
bind = $mod SHIFT, S, exec, ~/.config/scripts/cliphist_rofi.sh

# Terminal
bind = $mod, T, exec, $term

# Fechar janela
bind = $mod SHIFT, Q, killactive

# Launcher
bind = $mod, D, exec, $menu
bind = $mod, Z, exec, $teste

# Editor de texto/código
bind = $mod, G, exec, $editor

#File Manager
bind = $mod, E, exec, $fm

# Waypaper
bind = $mod, C, exec, waypaper

#Esconder e mostrar a Waybar
bind = $mod, O, exec, killall -SIGUSR1 waybar

#Swaync 
bind = $mod, M, exec,  swaync-client -op

# Reload config
bind = $mod SHIFT, C, exec, hyprctl reload

# Exit Hyprland
bind = $mod SHIFT, E, exit

# Screenshot
bind = , Print, exec, $screenshot

bind = $mod, W, exec, ~/.config/waypaper/wall.sh

bindl = , switch:Lid Switch, exec, hyprlock
bind = $mod, L, exec, sh -c "pidof hyprlock || hyprlock"
bind = SUPER, L, exec, ~/.config/hypr/scripts/randomHyprlock.sh

bind = SUPER, KP_DOWN, exec, pgrep gifview && pkill gifview || gifview -a Imagens/gif/resenha.gif
bind = SUPER, KP_DOWN, exec, notify-send -t 13000 -i ~/Imagens/gif/maquina.gif "RESENHA???"

#Mesa de Som (Windows + Num pad off)
bind = $mod, KP_END, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/eu-nao-sou-heroi.mp3 >/dev/null 2>&1 &
bind = $mod, KP_DOWN, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/resenha?.mp4 >/dev/null 2>&1 &
bind = $mod, KP_NEXT, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/vine.ogg >/dev/null 2>&1 &
bind = $mod, KP_LEFT, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/faaah.mp3 >/dev/null 2>&1 &
bind = , KP_BEGIN, exec, ~/.config/hypr/scripts/faiz.sh
bind = $mod, KP_HOME, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/auraEgo.mp3 >/dev/null 2>&1 &
bind = $mod, KP_UP, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/olha-a-mensagem.mp3 >/dev/null 2>&1 &
bind = $mod, KP_PRIOR, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/brutal-acabou-pro-beta-globo.mp3 >/dev/null 2>&1 &
bind = $mod, KP_DELETE, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/lonely.mp3 >/dev/null 2>&1 &
bind = $mod, KP_ADD, exec,  mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/axel2.wav >/dev/null 2>&1 &
bind = $mod, KP_INSERT, exec, mpv --no-video --really-quiet yes /home/bixcoitu/Músicas/mesaSom/faiz_begin.wav >/dev/null 2>&1 &
#------------------------------------------------

bind = $mod, $left, movefocus, l
bind = $mod, $right, movefocus, r
bind = $mod, $up, movefocus, u
bind = $mod, $down, movefocus, d

bind = $mod SHIFT, $left, movewindow, l
bind = $mod SHIFT, $right, movewindow, r
bind = $mod SHIFT, $up, movewindow, u
bind = $mod SHIFT, $down, movewindow, d

# ---------------- WORKSPACES ----------------
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ---------------- FULLSCREEN / FLOAT ----------------
bind = $mod, N, fullscreen
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, SPACE, layoutmsg, swapwithmaster

bindm = SUPER, mouse:272, movewindow

# ---------------- RESIZE ----------------
bind = $mod, R, submap, resize

submap = resize
binde = , $left, resizeactive, -20 0
binde = , $right, resizeactive, 20 0
binde = , $up, resizeactive, 0 -20
binde = , $down, resizeactive, 0 20

binde = , Right, resizeactive, 10 0
binde = , Left,  resizeactive, -10 0
binde = , Up,    resizeactive, 0 -10
binde = , Down,  resizeactive, 0 10

bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ---------------- SCRATCHPAD (SPECIAL WORKSPACE) ----------------
bind = $mod SHIFT, minus, movetoworkspace, special
bind = $mod, minus, togglespecialworkspace

# ---------------- VOLUME ----------------
bindel = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# ---------------- BRILHO ----------------
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 1%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 1%+

# ---------------- FLOAT RULES ----------------

gesture = 3, up, dispatcher, exec kitty
gesture = 3, horizontal, workspace
gesture = 3, down, mod: ALT, close
gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen
