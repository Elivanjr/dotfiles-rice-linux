# Biscoito config - Hyprland version
# =========================================================

# ------------------- MOD -------------------
#Define a tecla Super (aquela tecla com icone do Windows)
$mod = SUPER

# ---------------- VARIAVEIS ----------------
# Setas direcionais
$left = h
$down = j
$up = k
$right = l

# Terminal utilizado
$term = kitty

# Launcher de aplicativos com run e drun
$menu = wofi --show drun
$teste = wofi --show run

# Editor de código utilizado
$editor = kitty nvim

#Explorador de arquivos
$fm = dolphin

#Print
$screenshot = grim - | tee ~/Imagens/hyprland_prints/scrn-$(date +"%Y-%m-%d-%H-%M-%S").png | wl-copy

# ---------------- GERAL ----------------
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
    col.active_border = rgba(f06292ee) rgba(afe67aee) 45deg
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 10
    blur {
        enabled = false
    }
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
}

# ---------------- INPUT ----------------
input {
    kb_layout = br
    kb_variant = abnt2
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

# ---------------- AUTOSTART ----------------
exec-once = waypaper --backend swww --restore
exec-once = swaync
exec-once = ~/.config/swaync/spotify-notify.sh
exec-once = ~/.config/scripts/start.sh
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/kwalletd5
exec-once = kwalletd6
exec-once = ~/.config/scripts/hyprbar.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# ---------------- ATALHOS ----------------
brave --password-store=basic

bind = $mod SHIFT, S, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copyod SHIFT, S, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Terminal
bind = $mod, T, exec, $term

# Fechar janela
bind = $mod SHIFT, Q, killactive

# Launcher
bind = $mod, D, exec, $menu
bind = $mod, Z, exec, $teste

# Editor de texto/código
bind = $mod, G, exec, $editor

#File Manager
bind = $mod, E, exec, $fm

# Notificações
bind = $mod, N, exec, swaync-client -t

# Waypaper
bind = $mod, C, exec, waypaper

#Esconder e mostrar a Waybar
bind = $mod, O, exec, killall -SIGUSR1 waybar

# Widget

# Reload config
bind = $mod SHIFT, C, exec, hyprctl reload

# Exit Hyprland
bind = $mod SHIFT, E, exit

# Screenshot
bind = , Print, exec, $screenshot

# ---------------- FOCO ----------------
bind = $mod, $left, movefocus, l
bind = $mod, $right, movefocus, r
bind = $mod, $up, movefocus, u
bind = $mod, $down, movefocus, d

# ---------------- MOVER JANELAS ----------------
bind = $mod SHIFT, $left, movewindow, l
bind = $mod SHIFT, $right, movewindow, r
bind = $mod SHIFT, $up, movewindow, u
bind = $mod SHIFT, $down, movewindow, d

# ---------------- WORKSPACES ----------------
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ---------------- FULLSCREEN / FLOAT ----------------
bind = $mod, F, fullscreen
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, SPACE, layoutmsg, swapwithmaster

bindm = SUPER, mouse:272, movewindow

# ---------------- RESIZE ----------------
bind = $mod, R, submap, resize

submap = resize
binde = , $left, resizeactive, -20 0
binde = , $right, resizeactive, 20 0
binde = , $up, resizeactive, 0 -20
binde = , $down, resizeactive, 0 20

binde = , Right, resizeactive, 10 0
binde = , Left,  resizeactive, -10 0
binde = , Up,    resizeactive, 0 -10
binde = , Down,  resizeactive, 0 10

bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ---------------- SCRATCHPAD (SPECIAL WORKSPACE) ----------------
bind = $mod SHIFT, minus, movetoworkspace, special
bind = $mod, minus, togglespecialworkspace

# ---------------- VOLUME ----------------
bindel = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# ---------------- BRILHO ----------------
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

# ---------------- FLOAT RULES ----------------
#windowrule = float, class:^(pavucontrol)$
#windowrule = size 650 450, class:^(pavucontrol)$
#windowrule = center, class:(pavucontrol)$

#windowrulev2 = float, class:^(mpv)$
#windowrulev2 = center, class:^(mpv)$

#windowrulev = float, ^(waypaper)$
#windowrulev = float, class:^(blueman-manager)$

#windowrule = float,true,class:^(nm-connection-editor)$
#windowrule = center,class:^(nm-connection-editor)$

#windowrulev = center, floating:1, class:(foot)

gesture = 3, up, dispatcher, exec kitty
gesture = 3, horizontal, workspace
gesture = 3, down, mod: ALT, close
gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen


#Regras de janelas (blur, opacidade, flutuante, tamanho, etc)
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(blueman-manager)$, center on
windowrule = match:class ^(blueman-manager)$, size 800 600

windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nm-connection-editor)$, center on
windowrule = match:class ^(nm-connection-editor)$, size 800 600

windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(mpv)$, center on

windowrule = match:class ^(waypaper)$, float on
windowrule = match:class ^(waypaper)$, center on

windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(pavucontrol)$, center 800 600

windowrule = match:class ^(nwg-look)$, float on

windowrule = match:class ^(com.interversehq.qView)$, float on
windowrule = match:class ^(com.interversehq.qView)$, center on
windowrule = match:class ^(com.interversehq.qView)$, size 1080 620

windowrule = match:class ^(discord)$, opacity 1
windowrule = match:class ^(code-oss)$, opacity 0.75
windowrule = match:class ^(spotify)$, opacity 1
#windowrule = match:class ^(org.kde.dolphin)$, opacity 0.90
windowrule = match:class ^(file-png)$, float on
windowrule = match:class ^(kitty)$, center on

windowrule = match:class ^(xdg-desktop-portal-gtk), float on
windowrule = match:class ^(xdg-desktop-portal-gtk), center on

windowrule = match:class ^(steam_app_0), float on
windowrule = match:class ^(explorer.exe), float on
windowrule = match:class ^(explorer.exe), center on


#animation = workspaces, 1, 8, default
#animation = windows, 1, 10, slide right
#
animations {
    enabled = true

    bezier = myEase, 0.25, 0.1, 0.25, 1

    animation = global, 1, 10, default
    animation = windowsIn, 1, 3, myEase, popin 85%
    animation = windowsOut, 1, 3, myEase, slide
    animation = workspaces, 1, 10, default, slidefade
}

