# Biscoito config - Modulo: INPUT (teclado, mouse, touchpad, etc)
# =========================================================

# ---------------- INPUT----------------
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model=
    kb_options=
    kb_rules=
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

device {
    name = usb-keyboard-usb-keyboard
    kb_layout = br
    kb_variant = abnt2
}
